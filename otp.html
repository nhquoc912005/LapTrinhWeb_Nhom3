<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác thực OTP - Hệ Thống Quản Lý Văn Bản và Điều Hành</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

  <div class="login-card" style="max-width: 420px;">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
        </svg>
      </div>
      <div class="login-logo-text">
        <h1>Hệ Thống Quản Lý Văn Bản<br>và Điều Hành</h1>
        <p>Xác thực hai yếu tố</p>
      </div>
    </div>

    <!-- OTP Shield Icon -->
    <div style="text-align:center; margin-bottom: 16px;">
      <div style="width:64px;height:64px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--primary)">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
      </div>
      <h2 class="login-title" style="margin-bottom:6px;">Xác thực OTP</h2>
      <p class="login-subtitle" id="otpSubtitle">Nhập mã OTP 6 chữ số đã được gửi đến thiết bị của bạn</p>
      <p style="font-size:12px;color:var(--text-muted);">Mã OTP demo: <strong style="color:var(--primary);">123456</strong></p>
    </div>

    <!-- Error / Success messages -->
    <div class="login-error" id="otpError" role="alert"></div>
    <div id="otpSuccess" style="background:#DCFCE7;border:1px solid #BBF7D0;border-radius:6px;color:#166534;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;">
      ✅ Xác thực thành công! Đang chuyển hướng...
    </div>

    <!-- OTP Inputs -->
    <div class="otp-inputs" id="otpInputs">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp0" autocomplete="one-time-code">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp1">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp2">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp3">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp4">
      <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" id="otp5">
    </div>

    <!-- Timer -->
    <div class="otp-timer" id="otpTimerWrap">
      Mã OTP hết hạn sau: <span id="otpTimer">30</span> giây
    </div>

    <!-- Resend -->
    <div class="otp-resend" style="margin-bottom: 18px;">
      Không nhận được mã? <a id="resendBtn">Gửi lại OTP</a>
    </div>

    <!-- Verify Button -->
    <button class="btn btn-primary w-full btn-lg" id="verifyBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
      </svg>
      Xác thực
    </button>

    <!-- Back to login -->
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
      <a href="index.html" style="color:var(--primary);font-weight:600;">
        ← Quay lại đăng nhập
      </a>
    </p>

  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/otp.js"></script>
</body>
</html>
