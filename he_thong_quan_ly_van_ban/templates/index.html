<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Hệ Thống Quản Lý Văn Bản và Điều Hành</title>
  <meta name="description" content="Đăng nhập vào Hệ Thống Quản Lý Văn Bản và Điều Hành">
  <link rel="stylesheet" href="../static/assets/css/style.css">
</head>

<body class="login-page">

  <div class="login-header">
    <div class="login-logo-circle">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="#0076a2">
        <path
          d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z" />
      </svg>
    </div>
    <h1 class="login-sys-title">Hệ thống Quản lý Văn bản</h1>
    <p class="login-sys-subtitle">Đăng nhập để tiếp tục</p>
  </div>

  <div class="login-card">
    <h2 class="login-title">Đăng nhập</h2>

    <!-- Error message area -->
    <div class="login-error" id="loginError" role="alert"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="form-group" style="margin-bottom: 20px;">
        <label class="form-label" for="username">
          Tên đăng nhập <span class="required">*</span>
        </label>
        <div class="input-with-icon">
          <svg class="input-icon-left" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập"
            autocomplete="username" autofocus>
        </div>
        <span class="form-error-text" id="usernameError">Vui lòng nhập tên đăng nhập</span>
      </div>

      <div class="form-group" style="margin-bottom: 20px;">
        <label class="form-label" for="password">
          Mật khẩu <span class="required">*</span>
        </label>
        <div class="input-with-icon">
          <svg class="input-icon-left" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" name="password" class="form-control has-right-icon"
            placeholder="Nhập mật khẩu" autocomplete="current-password">
          <button type="button" id="togglePassword" class="input-action-right">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <span class="form-error-text" id="passwordError">Vui lòng nhập mật khẩu</span>
      </div>

      <div class="form-actions">
        <a href="#" class="forgot-pass-link">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        Đăng nhập
      </button>
    </form>

    <div class="login-footer-line"></div>


  </div><!-- /.login-card -->

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>

</html>
