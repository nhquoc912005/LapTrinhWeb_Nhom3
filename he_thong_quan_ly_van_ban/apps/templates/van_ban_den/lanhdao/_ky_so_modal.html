{% load static %}
<!-- Modal Ký Số -->
<div class="modal-overlay" id="kySoModal" style="display: none; z-index: 9999;">
  <div class="modal-container" style="max-width: 900px; width: 90%; max-height: 90vh; display: flex; flex-direction: column;">
    <div class="modal-header">
      <h3>Ký số văn bản</h3>
      <button type="button" class="modal-close" onclick="closeKySoModal()">&times;</button>
    </div>
    
    <div class="modal-body" style="flex: 1; overflow: auto; background: #e5e7eb; padding: 20px; display: flex; justify-content: center; position: relative;">
      
      <!-- Container for PDF and Signature -->
      <div id="pdfContainer" style="position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white;">
        <canvas id="pdfCanvas"></canvas>
        
        <!-- Draggable Signature Image -->
        {% if request.user.core_profile.chu_ky_so.anh_chu_ky %}
          <img 
            id="signatureImage" 
            src="{{ request.user.core_profile.chu_ky_so.anh_chu_ky.url }}" 
            style="position: absolute; top: 0; left: 0; width: 150px; height: 80px; cursor: move; border: 1px dashed #2563eb; background: rgba(255,255,255,0.5); object-fit: contain; z-index: 10;"
            draggable="false"
          >
        {% else %}
          <div id="signatureImage" style="display: none;"></div>
          <div style="position: absolute; top: 10px; left: 10px; background: #b91c1c; color: white; padding: 8px 12px;">Tài khoản chưa cấu hình ảnh chữ ký</div>
        {% endif %}
        <div id="kySoMessage" style="display:none; position:absolute; right:10px; bottom:10px; max-width:360px; background:#111827; color:#fff; padding:8px 12px; font-size:13px;"></div>
      </div>

    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="closeKySoModal()">Hủy</button>
      <button type="button" class="btn btn-primary" onclick="submitKySo()" id="btnSubmitKySo" {% if not request.user.core_profile.chu_ky_so.anh_chu_ky %}disabled title="Tài khoản chưa cấu hình ảnh chữ ký"{% endif %}>Xác nhận ký</button>
    </div>
  </div>
</div>

<input type="hidden" id="kySoCsrfToken" value="{{ csrf_token }}">
<script src="{% static 'vendor/pdfjs/pdf.min.js' %}"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = "{% static 'vendor/pdfjs/pdf.worker.min.js' %}";
  const kySoTemplateCsrfToken = "{{ csrf_token|escapejs }}";

  let pdfDoc = null;
  let canvas = document.getElementById('pdfCanvas');
  let ctx = canvas.getContext('2d');
  let sigImg = document.getElementById('signatureImage');
  let pdfContainer = document.getElementById('pdfContainer');
  let canUseSignature = sigImg && sigImg.tagName === 'IMG';

  function encodePathSegment(segment) {
    try {
      return encodeURIComponent(decodeURIComponent(segment));
    } catch (error) {
      return encodeURIComponent(segment);
    }
  }

  function encodeFileUrl(rawUrl) {
    const raw = (rawUrl || "").trim();
    if (!raw) return "";
    const absoluteMatch = raw.match(/^([a-z][a-z\d+.-]*:\/\/[^/]+)(.*)$/i);
    const origin = absoluteMatch ? absoluteMatch[1] : "";
    const rest = absoluteMatch ? (absoluteMatch[2] || "/") : raw;
    const queryIndex = rest.indexOf("?");
    const path = queryIndex >= 0 ? rest.slice(0, queryIndex) : rest;
    const query = queryIndex >= 0 ? rest.slice(queryIndex) : "";
    return origin + path.split("/").map(encodePathSegment).join("/") + query;
  }

  function setKySoMessage(message) {
    const box = document.getElementById('kySoMessage');
    if (!box) return;
    box.textContent = message || "";
    box.style.display = message ? "block" : "none";
  }

  function openKySoModal(pdfUrl) {
    document.getElementById('kySoModal').style.display = 'flex';
    setKySoMessage("");

    if (!canUseSignature) {
      setKySoMessage("Tài khoản chưa cấu hình ảnh chữ ký.");
      return;
    }

    const safePdfUrl = encodeFileUrl(pdfUrl);
    if (!safePdfUrl) {
      setKySoMessage("Đường dẫn PDF không hợp lệ.");
      return;
    }

    pdfjsLib.getDocument({ url: safePdfUrl, withCredentials: true }).promise.then(function(pdf) {
      pdfDoc = pdf;
      let lastPage = pdf.numPages;
      renderPage(lastPage);
    }).catch(function(error) {
      console.error("PDF ký số load error:", error);
      setKySoMessage("Không tải được PDF để ký. Hãy kiểm tra file hoặc mở file thủ công.");
    });
  }

  function closeKySoModal() {
    document.getElementById('kySoModal').style.display = 'none';
  }

  function renderPage(num) {
    pdfDoc.getPage(num).then(function(page) {
      let viewport = page.getViewport({ scale: 1.5 }); // Hiển thị to dễ nhìn
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      
      let renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };
      page.render(renderContext);
      
      // Reset signature position
      if (canUseSignature) {
        sigImg.style.left = '10px';
        sigImg.style.top = '10px';
      }
    });
  }

  // --- Logic kéo thả (Drag & Drop) ---
  let isDragging = false;
  let startX, startY, initialX, initialY;

  if (canUseSignature) {
    sigImg.addEventListener('mousedown', function(e) {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      initialX = sigImg.offsetLeft;
      initialY = sigImg.offsetTop;
      sigImg.style.cursor = 'grabbing';
    });
  }

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    
    let dx = e.clientX - startX;
    let dy = e.clientY - startY;
    
    let newX = initialX + dx;
    let newY = initialY + dy;
    
    // Ràng buộc trong canvas
    if (newX < 0) newX = 0;
    if (newY < 0) newY = 0;
    if (newX + sigImg.offsetWidth > canvas.width) newX = canvas.width - sigImg.offsetWidth;
    if (newY + sigImg.offsetHeight > canvas.height) newY = canvas.height - sigImg.offsetHeight;
    
    sigImg.style.left = newX + 'px';
    sigImg.style.top = newY + 'px';
  });

  document.addEventListener('mouseup', function() {
    isDragging = false;
    sigImg.style.cursor = 'move';
  });

  // --- Logic Gửi Tọa Độ ---
  function submitKySo() {
    let btn = document.getElementById('btnSubmitKySo');
    if (!canUseSignature) {
      alert("Tài khoản chưa cấu hình ảnh chữ ký.");
      return;
    }
    if (!canvas.width || !canvas.height) {
      alert("PDF chưa sẵn sàng để ký.");
      return;
    }
    btn.disabled = true;
    btn.innerText = 'Đang ký...';

    // Tính ratio
    let x_ratio = sigImg.offsetLeft / canvas.width;
    let y_ratio = sigImg.offsetTop / canvas.height;

    fetch("{% url 'quanlyvanbanden:api_ky_so_van_ban' vb.pk %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCsrfToken()
      },
      credentials: "same-origin",
      body: JSON.stringify({
        x_ratio: x_ratio,
        y_ratio: y_ratio
      })
    })
    .then(async response => {
      let data = null;
      try {
        data = await response.json();
      } catch (error) {
        if (response.status === 403) {
          throw new Error("Phiên xác thực đã hết hạn hoặc CSRF không hợp lệ. Hãy tải lại trang rồi ký lại.");
        }
        throw new Error(`Máy chủ trả về lỗi ${response.status}.`);
      }
      if (!response.ok && data && data.message) {
        throw new Error(data.message);
      }
      return data;
    })
    .then(data => {
      if (data.success) {
        alert(data.message);
        window.location.reload();
      } else {
        alert("Lỗi: " + data.message);
        btn.disabled = false;
        btn.innerText = 'Xác nhận ký';
      }
    })
    .catch(err => {
      alert("Không gửi được yêu cầu ký số: " + (err.message || "Lỗi không xác định."));
      btn.disabled = false;
      btn.innerText = 'Xác nhận ký';
    });
  }

  function getCsrfToken() {
    const tokenInput = document.getElementById("kySoCsrfToken");
    return getCookie("qlvb_csrftoken")
      || getCookie("csrftoken")
      || (tokenInput ? tokenInput.value : "")
      || kySoTemplateCsrfToken;
  }

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      let cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        let cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
</script>
