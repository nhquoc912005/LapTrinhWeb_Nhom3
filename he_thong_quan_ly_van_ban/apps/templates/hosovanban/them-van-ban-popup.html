<style>
    .modal-overlay-hsvb {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: flex-start;
        justify-content: center;
        z-index: 9999;
        padding-top: 80px;
    }
    .modal-overlay-hsvb.active {
        display: flex;
    }
    .modal-content-box-hsvb {
        background: #fff;
        width: 100%;
        max-width: 680px;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        overflow: hidden;
        font-family: inherit;
    }
    .modal-header-hsvb {
        padding: 20px 24px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .modal-header-hsvb h3 {
        margin: 0;
        font-size: 20px;
        color: #0284c7;
        font-weight: 700;
    }
    .modal-close-btn-hsvb {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #000;
        line-height: 1;
        padding: 0;
        font-weight: bold;
    }
    .modal-body-hsvb {
        padding: 24px;
    }
    .modal-body-hsvb label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 15px;
        color: #0f172a;
    }
    .modal-body-hsvb label span {
        color: #ef4444;
    }
    .modal-footer-hsvb {
        padding: 16px 24px;
        border-top: 1px solid #e2e8f0;
        display: flex;
        justify-content: flex-end;
        gap: 16px;
    }
    .modal-footer-hsvb button {
        padding: 10px 32px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 2px;
        cursor: pointer;
    }
    .modal-btn-cancel-hsvb {
        background: #fff;
        border: 1px solid #cbd5e1;
        color: #0f172a;
    }
    .modal-btn-cancel-hsvb:hover {
        background: #f8fafc;
    }
    .modal-btn-save-hsvb {
        background: #9ca3af;
        border: 1px solid #9ca3af;
        color: #fff;
    }
    .modal-btn-save-hsvb.active-save {
        background: #0284c7;
        border-color: #0284c7;
    }
    .modal-btn-save-hsvb.active-save:hover {
        background: #0369a1;
    }
    .toast-msg-hsvb {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 10001;
        padding: 14px 24px;
        border-radius: 4px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        display: none;
        max-width: 480px;
    }
    .toast-msg-hsvb.toast-success { background: #16a34a; }
    .toast-msg-hsvb.toast-error { background: #dc2626; }
    .toast-msg-hsvb.show { display: block; animation: slideInRight .3s ease; }
    @keyframes slideInRight {
        from { transform: translateX(60px); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
    }
    /* Searchable Dropdown Styles */
    .search-select-container-hsvb {
        position: relative;
        width: 100%;
    }
    .search-input-hsvb {
        width: 100%;
        padding: 12px 40px 12px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-size: 15px;
        color: #334155;
        background: #fff;
        transition: all 0.2s;
    }
    .search-input-hsvb:focus {
        outline: none;
        border-color: #0284c7;
        box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
    }
    .search-icon-hsvb {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        pointer-events: none;
    }
    .search-results-hsvb {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        max-height: 280px;
        overflow-y: auto;
        display: none;
        z-index: 100;
    }
    .search-results-hsvb.active {
        display: block;
    }
    .search-item-hsvb {
        padding: 10px 14px;
        cursor: pointer;
        transition: background 0.2s;
        border-bottom: 1px solid #f1f5f9;
    }
    .search-item-hsvb:last-child {
        border-bottom: none;
    }
    .search-item-hsvb:hover {
        background: #f0f9ff;
    }
    .search-item-hsvb .item-title {
        display: block;
        font-weight: 600;
        color: #0f172a;
        font-size: 14px;
        margin-bottom: 2px;
    }
    .search-item-hsvb .item-sub {
        display: block;
        font-size: 12px;
        color: #64748b;
    }
    .search-empty-hsvb {
        padding: 16px;
        text-align: center;
        color: #64748b;
        font-size: 14px;
    }
    .add-new-profile-btn-hsvb {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        color: #0284c7;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        transition: color 0.2s;
    }
    .add-new-profile-btn-hsvb:hover {
        color: #0369a1;
        text-decoration: underline;
    }
</style>

<div class="modal-overlay-hsvb" id="themVanBanPopup" onclick="checkCloseModalHSVB(event)">
    <div class="modal-content-box-hsvb" onclick="event.stopPropagation()">
        <div class="modal-header-hsvb">
            <h3>Thêm văn bản vào hồ sơ</h3>
            <button class="modal-close-btn-hsvb" onclick="closeThemVanBanPopup()">&times;</button>
        </div>
        <div class="modal-body-hsvb">
            <label>Hồ sơ văn bản <span>*</span></label>
            
            <div class="search-select-container-hsvb">
                <input type="text" 
                       id="hoSoSearchInput" 
                       class="search-input-hsvb" 
                       placeholder="Nhập tiêu đề hoặc ký hiệu để tìm hồ sơ..."
                       autocomplete="off"
                       onfocus="fetchAndShowHoSo()"
                       oninput="filterHoSo()">
                <div class="search-icon-hsvb">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <div id="hoSoSearchResults" class="search-results-hsvb">
                    <!-- Kết quả tìm kiếm sẽ hiện ở đây -->
                </div>
                <input type="hidden" id="hoSoSelectedId" value="">
            </div>

            {% if is_van_thu %}
            <a href="{% url 'hosovanban:them_ho_so_van_ban' %}" class="add-new-profile-btn-hsvb secondary-action">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                Thêm mới hồ sơ
            </a>
            {% endif %}
        </div>
        <div class="modal-footer-hsvb">
            <button class="modal-btn-cancel-hsvb" onclick="closeThemVanBanPopup()">Hủy</button>
            <button class="modal-btn-save-hsvb" id="btnSaveThemVanBan" onclick="saveThemVanBan()">Lưu</button>
        </div>
    </div>
</div>

<div class="toast-msg-hsvb" id="toastMsgHSVB"></div>

<script>
    var _popupVanBanId = typeof popupVanBanId !== 'undefined' ? popupVanBanId : null;
    var _popupVanBanType = typeof popupVanBanType !== 'undefined' ? popupVanBanType : 'van_ban_di';
    var _searchTimer = null;

    function openThemVanBanPopup() {
        document.getElementById('themVanBanPopup').classList.add('active');
        document.getElementById('hoSoSearchInput').value = '';
        document.getElementById('hoSoSelectedId').value = '';
        document.getElementById('hoSoSearchResults').classList.remove('active');
        toggleSaveButtonHSVB();
    }

    function closeThemVanBanPopup() {
        document.getElementById('themVanBanPopup').classList.remove('active');
    }

    function checkCloseModalHSVB(e) {
        if (e.target.id === 'themVanBanPopup') {
            closeThemVanBanPopup();
        }
    }

    function toggleSaveButtonHSVB() {
        var selectedId = document.getElementById('hoSoSelectedId').value;
        var btnSave = document.getElementById('btnSaveThemVanBan');
        if (selectedId) {
            btnSave.classList.add('active-save');
        } else {
            btnSave.classList.remove('active-save');
        }
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-select-container-hsvb')) {
            document.getElementById('hoSoSearchResults').classList.remove('active');
        }
    });

    function fetchAndShowHoSo() {
        var query = document.getElementById('hoSoSearchInput').value;
        var resultsBox = document.getElementById('hoSoSearchResults');
        resultsBox.innerHTML = '<div class="search-empty-hsvb">Đang tải...</div>';
        resultsBox.classList.add('active');

        fetch("{% url 'hosovanban:api_ds_ho_so_hien_hanh' %}?q=" + encodeURIComponent(query))
            .then(res => res.json())
            .then(data => {
                renderResults(data.ho_so);
            })
            .catch(err => {
                resultsBox.innerHTML = '<div class="search-empty-hsvb">Lỗi tải dữ liệu.</div>';
            });
    }

    function filterHoSo() {
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(function() {
            fetchAndShowHoSo();
        }, 300);
        document.getElementById('hoSoSelectedId').value = '';
        toggleSaveButtonHSVB();
    }

    function renderResults(list) {
        var resultsBox = document.getElementById('hoSoSearchResults');
        if (!list || list.length === 0) {
            resultsBox.innerHTML = '<div class="search-empty-hsvb">Không tìm thấy hồ sơ phù hợp.</div>';
            return;
        }
        var html = '';
        list.forEach(item => {
            html += `
                <div class="search-item-hsvb" onclick="selectHoSo('${item.id}', '${item.tieu_de.replace(/'/g, "\\'")}', '${item.ky_hieu}')">
                    <span class="item-title">${item.tieu_de}</span>
                    <span class="item-sub">Ký hiệu: ${item.ky_hieu}</span>
                </div>
            `;
        });
        resultsBox.innerHTML = html;
    }

    function selectHoSo(id, title, ky_hieu) {
        document.getElementById('hoSoSelectedId').value = id;
        document.getElementById('hoSoSearchInput').value = title;
        document.getElementById('hoSoSearchResults').classList.remove('active');
        toggleSaveButtonHSVB();
    }

    function showToastHSVB(message, type) {
        var toast = document.getElementById('toastMsgHSVB');
        toast.textContent = message;
        toast.className = 'toast-msg-hsvb toast-' + type + ' show';
        setTimeout(function() {
            toast.classList.remove('show');
        }, 4000);
    }

    function saveThemVanBan() {
        var hoSoId = document.getElementById('hoSoSelectedId').value;
        if (!hoSoId) {
            showToastHSVB('Vui lòng chọn một hồ sơ.', 'error');
            return;
        }
        if (!_popupVanBanId) {
            showToastHSVB('Không xác định được văn bản.', 'error');
            return;
        }

        var btnSave = document.getElementById('btnSaveThemVanBan');
        if (btnSave.disabled) return;
        btnSave.disabled = true;
        btnSave.textContent = 'Đang lưu...';

        var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
        var token = csrfToken ? csrfToken.value : '';

        var formData = new FormData();
        formData.append('ho_so_id', hoSoId);
        formData.append('van_ban_id', _popupVanBanId);
        formData.append('van_ban_type', _popupVanBanType);

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        fetch("{% url 'hosovanban:api_them_van_ban_vao_ho_so' %}", {
            method: 'POST',
            body: formData,
            signal: controller.signal,
            headers: { 'X-CSRFToken': token }
        })
        .then(function(response) { 
            clearTimeout(timeoutId);
            if (!response.ok) return response.text().then(text => { throw new Error(text) });
            return response.json(); 
        })
        .then(function(data) {
            if (data.ok) {
                closeThemVanBanPopup();
                showToastHSVB(data.message, 'success');
                setTimeout(function() { location.reload(); }, 500);
            } else {
                throw new Error(data.error || 'Có lỗi xảy ra.');
            }
        })
        .catch(function(err) {
            clearTimeout(timeoutId);
            btnSave.disabled = false;
            btnSave.textContent = 'Lưu';
            var msg = 'Lỗi kết nối hoặc hệ thống bận. Vui lòng thử lại.';
            if (err.name === 'AbortError') msg = 'Yêu cầu quá hạn (timeout). Vui lòng thử lại.';
            else if (err.message) msg = err.message.length > 100 ? err.message.substring(0, 100) + '...' : err.message;
            showToastHSVB(msg, 'error');
        });
    }
</script>
