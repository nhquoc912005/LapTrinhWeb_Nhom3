{% load static %}
<!-- popup-hoan-tra.html: Popup hoàn trả văn bản -->

<style>
  .hoantra-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    z-index: var(--z-modal, 1000);
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px;
    overflow-y: auto;
  }
  .hoantra-overlay.active { display: flex; }

  .hoantra-modal {
    width: 100%;
    max-width: 680px;
    background: #fff;
    padding: 28px 30px 26px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.14);

  }

  .hoantra-title {
    margin: 0 0 20px;
    font-size: 20px;
    font-weight: 700;
    color: #0077b6;
    padding-bottom: 14px;
    border-bottom: 1px solid #e5e7eb;
  }

  .hoantra-info-box {
    width: 100%;
    border: 1px solid #d1d5db;
    padding: 10px 12px;
    font-size: 15px;
    font-weight: 700;
    color: #2f2f2f;
    margin-bottom: 18px;
    background: #f9fafb;
  }

  .hoantra-label {
    display: block;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 700;
    color: #333;
  }

  .hoantra-input {
    width: 100%;
    height: 44px;
    border: 1px solid #d1d5db;
    padding: 10px 12px;
    font-size: 15px;
    color: #374151;
    outline: none;
    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.15s;
    background: #fff;
  }
  .hoantra-input:focus { border-color: #0077b6; }

  .hoantra-textarea {
    width: 100%;
    min-height: 126px;
    border: 1px solid #d1d5db;
    padding: 14px;
    font-size: 15px;
    color: #374151;
    resize: vertical;
    outline: none;
    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .hoantra-textarea:focus { border-color: #0077b6; }

  .hoantra-footer {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 22px;
  }

  .hoantra-btn {
    min-width: 94px;
    height: 46px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .hoantra-btn--cancel {
    border: 1px solid #d1d5db;
    background: #f3f4f6;
    color: #444;
  }
  .hoantra-btn--submit {
    background: #f59e0b;
    color: #fff;
  }
</style>

<div id="returnModal" class="hoantra-overlay">
  <div class="hoantra-modal">
    <h2 class="hoantra-title">Hoàn trả văn bản</h2>

    {% if messages %}
      {% for message in messages %}
        <div style="margin-bottom:12px; padding:10px 12px; background:#fee2e2; color:#b91c1c;
                    font-size:14px; border:1px solid #fecaca;">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <div class="hoantra-info-box">
      Chuyên viên: {{ vb.nguoi_tao.ho_va_ten|default:"-" }}
    </div>

    <form method="post" action="{% url 'quanlyvanbandi:hoan_tra_van_ban_di' vb.pk %}">
      {% csrf_token %}
      <label for="ly_do" class="hoantra-label">Lý do / Yêu cầu chỉnh sửa</label>
      <textarea id="ly_do" name="ly_do" class="hoantra-textarea"
                placeholder="Nhập lý do / Yêu cầu chỉnh sửa..." required></textarea>

      <div style="margin-top:16px;">
        <label for="han_xu_ly_hoan_tra" class="hoantra-label">Hạn xử lý hoàn trả</label>
        <input id="han_xu_ly_hoan_tra" name="han_xu_ly_hoan_tra" type="date" class="hoantra-input" required>
      </div>

      <div class="hoantra-footer">
        <button type="button" id="closeReturnModal" class="hoantra-btn hoantra-btn--cancel">Hủy</button>
        <button type="submit" class="hoantra-btn hoantra-btn--submit">Hoàn trả</button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  function setupHoanTraModal() {
    var overlay  = document.getElementById("returnModal");
    var openBtn  = document.getElementById("openReturnModal");
    var closeBtn = document.getElementById("closeReturnModal");
    var hanXuLyInput = document.getElementById("han_xu_ly_hoan_tra");
    if (!overlay) return;

    function openModal()  { overlay.classList.add("active");    document.body.style.overflow = "hidden"; }
    function closeModal() { overlay.classList.remove("active"); document.body.style.overflow = ""; }

    // Client-side guard: disallow picking past dates (server still validates).
    if (hanXuLyInput) {
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, "0");
      var dd = String(today.getDate()).padStart(2, "0");
      hanXuLyInput.min = yyyy + "-" + mm + "-" + dd;
    }

    if (openBtn)  openBtn.addEventListener("click",  openModal);
    if (closeBtn) closeBtn.addEventListener("click", closeModal);
    overlay.addEventListener("click", function (e) { if (e.target === overlay) closeModal(); });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupHoanTraModal);
  } else {
    setupHoanTraModal();
  }
})();
</script>

{% if open_return_modal %}
<script>
  (function () {
    function openIfRequested() {
      var overlay = document.getElementById("returnModal");
      if (!overlay) return;
      overlay.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", openIfRequested);
    } else {
      openIfRequested();
    }
  })();
</script>
{% endif %}
